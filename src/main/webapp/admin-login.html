<!DOCTYPE html>
<html>
<head>
    <title>Travel World</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .brand-title {
            position: fixed;
            top: 20px;
            left: 28px;
            font-size: 3rem;
            font-weight: bold;
            color: white;
            text-shadow: 0 2px 8px rgba(0,0,0,0.5);
            letter-spacing: 2px;
            z-index: 100;
        }
    </style>
</head>
<head>
    <title>Admin Login</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="brand-title"> Travel World</div>


<div class="container">
    <div class="card">

        <h2>Admin Login</h2>

        <!-- SUCCESS MESSAGE -->
        <div id="successMessage" style="
            display: none;
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            padding: 12px 16px;
            border-radius: 6px;
            margin-bottom: 16px;
            text-align: center;
        ">
            <strong>✅ Account Created Successfully!</strong><br>
            Start your journey now.<br>
            <span style="font-size: 13px;">Your User ID: <strong id="displayUserId"></strong></span>
        </div>

        <!-- ERROR MESSAGE -->
        <div id="errorMessage" style="
            display: none;
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            padding: 12px 16px;
            border-radius: 6px;
            margin-bottom: 16px;
            text-align: center;
        ">
             Invalid username or password. Please try again.
        </div>

        <form method="post" action="login">

            <!-- hidden role field -->
            <input type="hidden" name="role" value="admin">

            <input type="text" name="username" placeholder="Username">
            <br><br>
            <input type="password" name="password" placeholder="Password">
            <br><br>
            <button type="submit">Login</button>

        </form>

        <br>
        <a href="admin-register.html"><button>Create Account</button></a>
        <br><br>
        <a href="role-selection.html"><button>Back</button></a>

    </div>
</div>

<script>
    const params = new URLSearchParams(window.location.search);

    if (params.get("status") === "success") {
        document.getElementById("displayUserId").textContent = params.get("userId");
        document.getElementById("successMessage").style.display = "block";
    }

    if (params.get("status") === "failed") {
        document.getElementById("errorMessage").style.display = "block";
    }
</script>
<script src="js/app.js"></script>

</body>
</html>
